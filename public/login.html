<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - SpiceSpark</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(135deg,#0f172a,#020617);
overflow:hidden;
}

/* floating animation background */

body::before{
content:"";
position:absolute;
width:600px;
height:600px;
background:#f97316;
filter:blur(200px);
opacity:0.3;
top:-100px;
left:-100px;
animation:float 10s infinite alternate;
}

body::after{
content:"";
position:absolute;
width:600px;
height:600px;
background:#38bdf8;
filter:blur(200px);
opacity:0.3;
bottom:-100px;
right:-100px;
animation:float 12s infinite alternate;
}

@keyframes float{
from{transform:translateY(0)}
to{transform:translateY(60px)}
}

/* card */

.login-card{
position:relative;
background:#020617;
padding:40px;
width:350px;
border-radius:14px;
box-shadow:0 20px 60px rgba(0,0,0,0.6);
text-align:center;
color:white;
animation:fadeIn 1s ease;
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(20px)}
to{opacity:1;transform:translateY(0)}
}

.login-card h2{
margin-bottom:20px;
color:#f97316;
}

/* inputs */

.input-group{
position:relative;
margin-bottom:20px;
}

.input-group input{
width:100%;
padding:12px 40px;
border:none;
border-radius:8px;
background:#1e293b;
color:white;
font-size:15px;
}

.input-group i{
position:absolute;
top:12px;
left:12px;
color:#94a3b8;
}

/* button */

button{
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:#f97316;
color:white;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#fb923c;
transform:scale(1.05);
}

/* links */

.links{
margin-top:15px;
font-size:14px;
}

.links a{
color:#38bdf8;
text-decoration:none;
}

.links a:hover{
text-decoration:underline;
}

/* mobile */

@media(max-width:450px){

.login-card{
width:90%;
}

}

</style>
</head>

<body>

<div class="login-card">

<h2>Welcome Back</h2>

<form method="POST" action="/login">

<div class="input-group">
<i class="fa fa-envelope"></i>
<input type="email" name="email" placeholder="Email" required>
</div>

<div class="input-group">
<i class="fa fa-lock"></i>
<input type="password" name="password" placeholder="Password" required>
</div>

<button type="submit">Login</button>

</form>

<div class="links">

<p><a href="forgot-password.html">Forgot Password?</a></p>

<p>Don't have an account?  
<a href="register.html">Register</a></p>

</div>

</div>

</body>
</html>
