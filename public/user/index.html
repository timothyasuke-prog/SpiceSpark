<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpiceSpark | Professional Kitchen</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <meta name="theme-color" content="#f97316">
    <link rel="manifest" href="../manifest.json">
</head>
<body>
    <!-- PWA install button (mobile) -->
    <button id="pwa-install-btn" class="pwa-install-btn" aria-hidden="true"><i class="fas fa-download"></i> Install</button>
    <!-- Replaced full sidebar with a single fixed navigation button + compact menu -->
    <button id="nav-btn" class="left-nav-btn" aria-label="Open navigation" onclick="toggleNavMenu()"><i class="fas fa-bars"></i></button>
    <div id="nav-menu" class="left-nav-menu" aria-hidden="true" style="display:none;">
        <div style="margin-bottom:8px; font-weight:800; color: #f97316;">SpiceSpark</div>
        <div class="nav-item active" id="btn-gen" onclick="showTab('gen')"><i class="fas fa-magic"></i> Generator</div>
        <div class="nav-item" id="btn-box" onclick="showTab('box')"><i class="fas fa-book-heart"></i> My Recipe Box</div>
        <div class="nav-item" onclick="logout()" style="color: #ef4444;"><i class="fas fa-sign-out-alt"></i> Logout</div>
    </div>

    <main class="main-panel">
        <div id="gen" class="tab-content tab-active">
            <h1 style="font-size: 2.5rem; margin-bottom: 10px;">Executive Kitchen</h1>
            <p style="color: #64748b; margin-bottom: 30px;">Enter ingredients to receive a detailed step-by-step lesson.</p>
            
            <div class="recipe-card" style="margin-bottom: 40px;">
                <input type="text" id="ingredients" placeholder="What are we cooking with? (e.g. Eggs, Oil, Salt)" style="width: 100%; padding: 15px; border-radius: 10px; border: 1px solid #e2e8f0; font-size: 1rem;">
                <div style="margin-top: 20px; display: flex; gap: 15px;">
                    <select id="cuisine" class="fancy-select"><option>Global</option><option>French</option><option>Italian</option><option>Indian</option><option>Thai</option><option>Kenyan</option><option>American</option></select>
                    <select id="dietary" class="fancy-select"><option>No Restriction</option><option>Vegan</option><option>Keto</option><option>Gluten-Free</option><option>Vegetarian</option><option>Keto</option><option>Dairy-Free</option><option>Nut-Free</option><option>Paleo</option></select>
                    <button class="btn-primary" onclick="generate()" style="flex:1;">Compose Lesson</button>
                </div>
                <div style="margin-top: 10px; display:flex; justify-content:center;">
                    <button id="btn-bored" class="btn-primary" style="background:#ef4444; width:100%; max-width:200px;" onclick="surpriseMe()">🎲 I'm Bored</button>
                </div>
            </div>

            <div id="output"></div>
        </div>

        <div id="box" class="tab-content">
            <h1>My Recipe Box</h1>
            <div id="savedContainer" class="grid-2"></div>
            <!-- Saved recipe modal -->
            <div id="savedModal" class="saved-modal" style="display:none;">
                <div class="saved-modal-inner">
                    <button class="saved-modal-close" onclick="closeSavedModal()">✕</button>
                    <h2 id="modalTitle">Recipe</h2>
                    <div id="modalContent" class="recipe-content" style="margin-top:12px; white-space:pre-wrap;"></div>
                    <div style="margin-top:18px; display:flex; gap:10px;">
                        <button id="modalDownload" class="btn-primary"><i class="fas fa-file-pdf"></i> Download PDF</button>
                        <button id="modalDelete" class="btn-primary" style="background:#ef4444;"><i class="fas fa-trash"></i> Delete</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // --- 1. SECURITY LOCK ---
        function getCookie(name) {
            const v = document.cookie.match('(^|;)\\s*' + name + '\\s*=\\s*([^;]+)');
            return v ? decodeURIComponent(v.pop()) : null;
        }

        let userEmail = localStorage.getItem('userEmail');
        if ((!userEmail || userEmail === "null") && getCookie('spice_user')) {
            // restore from cookie if present
            userEmail = getCookie('spice_user');
            localStorage.setItem('userEmail', userEmail);
        }

        if (!userEmail || userEmail === "null") {
            alert("Security: Please login to access the Generation Room.");
            window.location.href = "../login.html";
        } else {
            const ud = document.getElementById('userDisplay');
            if (ud) ud.innerText = "Logged in as: " + userEmail;
        }

        // --- 2. NAVIGATION ---
        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('tab-active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('tab-active');
            document.getElementById('btn-' + id).classList.add('active');
            if(id === 'box') loadSaved();
        }

        // --- 3. GENERATION ---

        // --- SIDEBAR TOGGLE/RESPONSIVE ---
        function toggleSidebar() {
            const sb = document.querySelector('.sidebar');
            if (!sb) return;
            sb.classList.toggle('collapsed');
        }

        function handleResize() {
            const sb = document.querySelector('.sidebar');
            if (!sb) return;
            if (window.innerWidth < 768) {
                sb.classList.add('collapsed');
            } else {
                sb.classList.remove('collapsed');
            }
        }
        window.addEventListener('resize', handleResize);
        handleResize();

        async function generate() {
            const output = document.getElementById('output');
            output.innerHTML = `
                <div class="recipe-card" style="text-align:center; padding: 50px;">
                    <i class="fas fa-spinner fa-spin" style="font-size:3rem; color:#f97316;"></i>
                    <h3 style="margin-top:20px;">ChefNova is writing your recipe...</h3>
                </div>`;

            try {
                const res = await fetch('/api/generate-recipe', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ 
                        ingredients: document.getElementById('ingredients').value, 
                        userEmail: userEmail, // Stored from Login
                        cuisine: document.getElementById('cuisine').value, 
                        dietary: document.getElementById('dietary').value 
                    })
                });

                if (res.status === 401) {
                    alert("Session expired. Logging out.");
                    logout();
                    return;
                }

                const data = await res.json();
                
                const lines = data.recipes.split('\n');
                const title = lines.find(l => l.startsWith('TITLE:'))?.replace('TITLE:', '').trim() || "YOUR RECIPE";
                const stats = lines.find(l => l.startsWith('STATS:'))?.replace('STATS:', '').trim() || "";
                const body = data.recipes.split('\n').slice(2).join('\n');

                const formatted = body
                    .replace(/### (.*)/g, '<h3 class="section-header">$1</h3>')
                    .replace(/\[ \]/g, '<input type="checkbox" class="ingredient-check">')
                    .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
                    .replace(/\n/g, '<br>');

                output.innerHTML = `
                    <div class="recipe-card animated-in">
                        <h1 class="recipe-title">${title}</h1>
                        <div class="stats-bar">${stats}</div>
                        <div class="recipe-content" id="recipeText">${formatted}</div>
                        <div class="recipe-actions" style="margin-top:25px; display:flex; gap:10px;">
                            <button onclick="saveToBox('${title}')" class="btn-primary" style="background:#10b981;"><i class="fas fa-heart"></i> Save to Box</button>
                            <button onclick="downloadPDF('${title}')" class="btn-primary" style="background:#3b82f6;"><i class="fas fa-file-pdf"></i> Download PDF</button>
                        </div>
                    </div>`;
            } catch (err) {
                output.innerHTML = `<div class="recipe-card">Error: Failed to reach the chef.</div>`;
            }
        }

        // --- 3.5. SURPRISE ME ---
        function surpriseMe() {
            const staples = 'salt, water, oil, flour, sugar';
            const cuisineList = Array.from(document.getElementById('cuisine').options).map(o => o.value);
            const dietaryList = Array.from(document.getElementById('dietary').options).map(o => o.value);
            const random = arr => arr[Math.floor(Math.random() * arr.length)];

            document.getElementById('ingredients').value = staples;
            document.getElementById('cuisine').value = random(cuisineList);
            document.getElementById('dietary').value = random(dietaryList);
            generate();
        }

        // --- 4. EXTRAS ---
        function downloadPDF(title) {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const text = document.getElementById('recipeText').innerText;
            doc.setFontSize(20);
            doc.text(title, 20, 20);
            doc.setFontSize(10);
            const split = doc.splitTextToSize(text, 170);
            doc.text(split, 20, 30);
            doc.save(`${title}.pdf`);
        }

        async function saveToBox(title) {
            const content = document.getElementById('recipeText').innerText;
            await fetch('/api/user/save-recipe', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ email: userEmail, title, content })
            });
            alert("Recipe saved to your box!");
        }

        async function loadSaved() {
            try {
                const res = await fetch(`/api/user/my-recipes/${userEmail}`);
                const recipes = await res.json();
                // store locally for modal access
                window._savedRecipes = recipes;
                const container = document.getElementById('savedContainer');
                if (!container) return;
                container.innerHTML = recipes.map((r, i) => `
                    <div class="recipe-card saved-card" data-index="${i}">
                        <h3 style="margin-top:0;">${r.title}</h3>
                        <p style="font-size:0.9rem; color:#64748b;">${r.content.substring(0, 80)}...</p>
                        <div style="margin-top:12px; display:flex; gap:8px;">
                            <button class="btn-primary" onclick="openSaved(${i})"><i class="fas fa-eye"></i> Open</button>
                            <button class="btn-primary" style="background:#3b82f6;" onclick="downloadSaved(${i})"><i class="fas fa-file-pdf"></i> Download</button>
                            <button class="btn-primary" style="background:#ef4444;" onclick="deleteSaved(${i})"><i class="fas fa-trash"></i> Delete</button>
                        </div>
                    </div>
                `).join('');
            } catch (err) {
                console.error('Failed to load saved recipes', err);
            }
        }

        function openSaved(index) {
            const list = window._savedRecipes || [];
            const r = list[index];
            if (!r) return alert('Recipe not found');
            document.getElementById('modalTitle').innerText = r.title;
            document.getElementById('modalContent').innerText = r.content;
            document.getElementById('savedModal').style.display = 'block';
            const dlBtn = document.getElementById('modalDownload');
            const delBtn = document.getElementById('modalDelete');
            dlBtn.onclick = () => downloadSaved(index);
            delBtn.onclick = () => deleteSaved(index);
        }

        function closeSavedModal() {
            document.getElementById('savedModal').style.display = 'none';
        }

        function downloadSaved(index) {
            const list = window._savedRecipes || [];
            const r = list[index];
            if (!r) return alert('Recipe not found');
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.setFontSize(18);
            doc.text(r.title, 14, 20);
            doc.setFontSize(11);
            const split = doc.splitTextToSize(r.content, 180);
            doc.text(split, 14, 30);
            doc.save(`${r.title}.pdf`);
        }

        async function deleteSaved(index) {
            const list = window._savedRecipes || [];
            const r = list[index];
            if (!r) return alert('Recipe not found');
            if (!confirm('Delete this saved recipe?')) return;
            try {
                await fetch('/api/user/delete-recipe', {
                    method: 'POST',
                    headers: {'Content-Type':'application/json'},
                    body: JSON.stringify({ email: userEmail, title: r.title })
                });
                // refresh list
                await loadSaved();
                closeSavedModal();
            } catch (err) {
                console.error('Delete failed', err);
                alert('Failed to delete recipe');
            }
        }

        function logout() {
            localStorage.clear();
            // clear the persistent cookie as well
            document.cookie = 'spice_user=; Max-Age=0; path=/;';
            window.location.href = "../login.html";
        }

        // Compact nav menu toggle (left fixed button)
        function toggleNavMenu() {
            const menu = document.getElementById('nav-menu');
            if (!menu) return;
            const isHidden = menu.getAttribute('aria-hidden') === 'true';
            menu.setAttribute('aria-hidden', String(!isHidden));
            menu.style.display = isHidden ? 'block' : 'none';
        }

        // Close nav menu when clicking outside of it
        document.addEventListener('click', function(e) {
            const menu = document.getElementById('nav-menu');
            const btn = document.getElementById('nav-btn');
            if (!menu || !btn) return;
            const isVisible = menu.style.display === 'block';
            if (!isVisible) return;
            if (!menu.contains(e.target) && !btn.contains(e.target)) {
                menu.style.display = 'none';
                menu.setAttribute('aria-hidden', 'true');
            }
        });
    </script>
    <script>
        // PWA install prompt handling (mobile-friendly)
        let deferredInstallPrompt = null;
        const pwaBtn = document.getElementById('pwa-install-btn');

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredInstallPrompt = e;
            if (pwaBtn) {
                pwaBtn.style.display = 'block';
                pwaBtn.setAttribute('aria-hidden', 'false');
            }
        });

        if (pwaBtn) {
            pwaBtn.addEventListener('click', async () => {
                if (!deferredInstallPrompt) return;
                deferredInstallPrompt.prompt();
                const choice = await deferredInstallPrompt.userChoice;
                if (choice.outcome === 'accepted') {
                    console.log('PWA: user accepted install');
                } else {
                    console.log('PWA: user dismissed install');
                }
                deferredInstallPrompt = null;
                pwaBtn.style.display = 'none';
                pwaBtn.setAttribute('aria-hidden', 'true');
            });
        }

        window.addEventListener('appinstalled', () => {
            if (pwaBtn) {
                pwaBtn.style.display = 'none';
                pwaBtn.setAttribute('aria-hidden', 'true');
            }
            console.log('PWA installed');
        });
    </script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/service-worker.js').catch(console.error);
        }
    </script>
</body>
</html>
