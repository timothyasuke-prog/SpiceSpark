<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="theme-color" content="#f97316">
    <link rel="manifest" href="manifest.json">
    <title>Forgot Password | SpiceSpark</title>
    <link rel="stylesheet" href="user/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { display: flex; align-items: center; justify-content: center; height: 100vh; background: #0f172a; }
        .auth-card { background: white; padding: 40px; border-radius: 20px; width: 100%; max-width: 400px; box-shadow: 0 20px 40px rgba(0,0,0,0.3); }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #e2e8f0; border-radius: 8px; }
    </style>
</head>
<body>

    <div class="auth-card">
        <h2 style="text-align: center; color: #f97316;"><i class="fas fa-hat-chef"></i> SpiceSpark</h2>
        <p style="text-align: center; color: #64748b;">Enter your account email and we will send a reset link.</p>
        <form id="forgotForm">
            <input type="email" id="email" placeholder="Email Address" required>
            <button type="submit" class="btn-primary" style="width: 100%; margin-top: 10px;">Send Reset Link</button>
        </form>
        <p style="text-align: center; margin-top: 20px; font-size: 0.9rem;">
            <a href="login.html" style="color: #f97316; font-weight: bold;">Back to Login</a>
        </p>
    </div>

    <script>
        document.getElementById('forgotForm').onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            try {
                const res = await fetch('/api/auth/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                const data = await res.json();
                if (res.ok) {
                    alert(data.message);
                    window.location.href = 'login.html';
                } else {
                    alert(data.error || 'Request failed');
                }
            } catch (err) {
                alert('Server is down. Check your terminal.');
            }
        };
    </script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/service-worker.js').catch(console.error);
        }
    </script>
</body>
</html>
