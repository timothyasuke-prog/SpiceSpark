<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reset Password | SpiceSpark</title>
    <link rel="stylesheet" href="user/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { display: flex; align-items: center; justify-content: center; height: 100vh; background: #0f172a; }
        .auth-card { background: white; padding: 40px; border-radius: 20px; width: 100%; max-width: 400px; box-shadow: 0 20px 40px rgba(0,0,0,0.3); }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #e2e8f0; border-radius: 8px; }
    </style>
</head>
<body>

    <div class="auth-card">
        <h2 style="text-align: center; color: #f97316;"><i class="fas fa-hat-chef"></i> SpiceSpark</h2>
        <p style="text-align: center; color: #64748b;">Choose a new password for your account.</p>
        <form id="resetForm">
            <input type="password" id="password" placeholder="New Password" required>
            <input type="password" id="confirm" placeholder="Confirm Password" required>
            <button type="submit" class="btn-primary" style="width: 100%; margin-top: 10px;">Reset Password</button>
        </form>
        <p style="text-align: center; margin-top: 20px; font-size: 0.9rem;">
            <a href="login.html" style="color: #f97316; font-weight: bold;">Back to Login</a>
        </p>
    </div>

    <script>
        // extract token
        const params = new URLSearchParams(window.location.search);
        const token = params.get('token');
        if (!token) {
            alert('Invalid reset link');
            window.location.href = 'login.html';
        }

        document.getElementById('resetForm').onsubmit = async (e) => {
            e.preventDefault();
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirm').value;
            if (password !== confirm) {
                alert('Passwords do not match');
                return;
            }
            try {
                const res = await fetch('/api/auth/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, password })
                });
                const data = await res.json();
                if (res.ok) {
                    alert(data.message);
                    window.location.href = 'login.html';
                } else {
                    alert(data.error || 'Reset failed');
                }
            } catch (err) {
                alert('Server is down.');
            }
        };
    </script>
</body>
</html>
