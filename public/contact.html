<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contact | SpiceSpark</title>

<link rel="manifest" href="/manifest.json">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
margin:0;
font-family:Inter, system-ui, -apple-system,'Segoe UI',Roboto;
background:linear-gradient(180deg,#e6eefc 0%, #f1f5f9 40%);
}

/* NAVBAR */

.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 40px;
background:#08307a;
color:#fff;
}

.nav-links{
display:flex;
gap:20px;
}

.nav-links a{
color:#fff;
text-decoration:none;
font-weight:700;
position:relative;
}

.nav-links a::after{
content:'';
position:absolute;
left:0;
bottom:-4px;
width:0%;
height:2px;
background:#fff;
transition:0.3s;
}

.nav-links a:hover::after{
width:100%;
}

.brand{
font-weight:900;
font-size:22px;
}

/* CONTACT SECTION */

.contact-container{
max-width:900px;
margin:60px auto;
background:#fff;
padding:40px;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

.contact-container h1{
margin-top:0;
color:#08307a;
}

.contact-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:30px;
}

.contact-info{
font-size:16px;
line-height:1.6;
}

.contact-info strong{
color:#08307a;
}

/* SOCIAL ICONS */

.social-icons{
display:flex;
gap:15px;
margin-top:20px;
flex-wrap:wrap;
}

.social-icons a{
font-size:24px;
width:45px;
height:45px;
display:flex;
align-items:center;
justify-content:center;
border-radius:50%;
color:#fff;
text-decoration:none;
transition:0.3s;
}

/* Icon colors */

.email{background:#f97316;}
.github{background:#000;}
.instagram{background:#e1306c;}
.facebook{background:#1877f2;}
.twitter{background:#1da1f2;}

.social-icons a:hover{
transform:scale(1.15);
}

/* FORM */

form{
display:flex;
flex-direction:column;
gap:14px;
}

input, textarea{
padding:12px;
border-radius:6px;
border:1px solid #ccc;
font-size:14px;
}

textarea{
min-height:120px;
resize:vertical;
}

button{
background:#f97316;
border:none;
padding:12px;
color:#fff;
font-weight:700;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#ea580c;
}

/* FOOTER */

footer{
text-align:center;
margin:40px 0;
color:#555;
}

@media(max-width:700px){

.contact-grid{
grid-template-columns:1fr;
}

.navbar{
flex-direction:column;
gap:10px;
}

}

</style>

</head>

<body>

<!-- NAVBAR -->

<div class="navbar">

<div class="brand">SpiceSpark</div>

<div class="nav-links">
<a href="/landing.html">Home</a>
<a href="/register.html">Register</a>
<a href="/login.html">Login</a>
</div>

</div>


<!-- CONTACT CONTENT -->

<div class="contact-container">

<h1>Contact Us</h1>

<div class="contact-grid">

<div class="contact-info">

<p>
Have questions about <strong>SpiceSpark</strong>?  
Want to share feedback or ideas?
</p>

<p>
<strong>Creator:</strong> Asuke Timothy Junior (Timothy TJ)
</p>

<p>Connect with us through any platform below:</p>

<div class="social-icons">

<a class="email" href="mailto:youremail@example.com">
<i class="fas fa-envelope"></i>
</a>

<a class="github" href="#" target="_blank">
<i class="fab fa-github"></i>
</a>

<a class="instagram" href="#" target="_blank">
<i class="fab fa-instagram"></i>
</a>

<a class="facebook" href="#" target="_blank">
<i class="fab fa-facebook-f"></i>
</a>

<a class="twitter" href="#" target="_blank">
<i class="fab fa-twitter"></i>
</a>

</div>

</div>


<form>

<input type="text" placeholder="Your Name" required>

<input type="email" placeholder="Your Email" required>

<textarea placeholder="Your Message"></textarea>

<button type="submit">Send Message</button>

</form>

</div>

</div>


<footer>
© 2026 SpiceSpark — Created by Asuke Timothy Junior
</footer>

</body>
</html>
