<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SpiceSpark | Business Intelligence</title>
    <link rel="stylesheet" href="../user/style.css">
    <meta name="theme-color" content="#f97316">
    <link rel="manifest" href="../manifest.json">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { display: grid; grid-template-columns: 280px 1fr; background: #f1f5f9; min-height: 100vh; }
        
        /* Sidebar Feed Style */
        .sidebar { background: #0f172a; color: white; padding: 20px; border-right: 1px solid #334155; height: 100vh; position: sticky; top: 0; overflow-y: auto; }
        .feed-item { background: #1e293b; padding: 12px; border-radius: 8px; margin-bottom: 10px; font-size: 0.8rem; border-left: 3px solid #f97316; }
        
        /* Main Layout */
        .main-content { padding: 30px; }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-bottom: 30px; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        
        /* Wall of Shame Styles */
        .error-row { color: #ef4444; background: #fef2f2; font-family: monospace; font-size: 0.75rem; }
        .status-pill { padding: 4px 8px; border-radius: 10px; font-size: 0.7rem; font-weight: bold; }
        
        /* Mobile responsive */
        @media (max-width: 768px) {
            body { display: block; }
            .sidebar { position: fixed; left: -280px; top: 0; height: 100%; width: 280px; padding: 20px; z-index: 999; transition: left 0.3s; }
            .sidebar:not(.collapsed) { left: 0; }
            .sidebar.collapsed { left: -280px !important; }
            .main-content { padding: 20px; }
            .grid-3 { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <!-- compact left nav button/menu (matches user panel style) -->
    <button id="nav-btn" class="left-nav-btn" aria-label="Open navigation" onclick="toggleNavMenu()"><i class="fas fa-bars"></i></button>
    <div id="nav-menu" class="left-nav-menu" aria-hidden="true" style="display:none;">
        <div style="margin-bottom:8px; font-weight:800; color: #f97316;">Admin</div>
        <div class="nav-item" onclick="location.href='/admin-dashboard'">Dashboard</div>
        <div class="nav-item" onclick="location.href='/admin-live-pulse'">Live Pulse</div>
    </div>

    <button class="sidebar-toggle-mobile" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>

    <aside class="sidebar">
        <button id="sidebar-toggle" onclick="toggleSidebar()">
            <i class="fas fa-bars"></i>
        </button>
        <h2 style="font-size: 1rem; color: #f97316;"><i class="fas fa-bolt"></i> NAV</h2>
        <div style="margin-top:12px;">
            <div class="nav-btn" onclick="location.href='/admin-dashboard'">Dashboard</div>
            <div class="nav-btn" onclick="location.href='/admin-live-pulse'">Live Pulse</div>
        </div>
    </aside>

    <main class="main-content">
        <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
            <h1>Dashboard Overview</h1>
            <button onclick="fetchAllData()" class="btn-primary" style="padding: 8px 15px;"><i class="fas fa-sync"></i> Refresh</button>
        </header>

        <div class="grid-3">
            <div class="card">
                <h3 style="font-size: 0.8rem; color: #64748b;">TOTAL USERS</h3>
                <p id="totalUsers" style="font-size: 2rem; font-weight: bold;">0</p>
            </div>
            <div class="card">
                <canvas id="cuisineChart" height="200"></canvas>
            </div>
            <div class="card">
                <canvas id="dietaryChart" height="200"></canvas>
            </div>
        </div>

        <div class="card" style="margin-bottom: 30px;">
            <h3>User Management</h3>
            <table style="width: 100%; border-collapse: collapse;">
                <thead><tr style="text-align: left; border-bottom: 2px solid #f1f5f9;"><th>Email</th><th>Last Active</th><th>Actions</th></tr></thead>
                <tbody id="userTable"></tbody>
            </table>
        </div>

        <div class="card" style="border-top: 5px solid #ef4444;">
            <h3 style="color: #ef4444;"><i class="fas fa-exclamation-triangle"></i> THE WALL OF SHAME (Error Logs)</h3>
            <div style="max-height: 200px; overflow-y: auto;">
                <table style="width: 100%; text-align: left;">
                    <tbody id="errorTable"></tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        let charts = {};

        async function fetchAllData() {
            const [usersRes, feedRes, errorRes] = await Promise.all([
                fetch('/api/admin/all-users'),
                fetch('/api/admin/live-feed'),
                fetch('/api/admin/errors')
            ]);

            const users = await usersRes.json();
            const feed = await feedRes.json();
            const errors = await errorRes.json();

            updateStats(users);
            updateFeed(feed);
            updateErrors(errors);
            updateCharts(users);
        }

        function updateStats(users) {
            document.getElementById('totalUsers').innerText = users.length;
            const tbody = document.getElementById('userTable');
            tbody.innerHTML = users.map(u => `
                <tr style="border-bottom: 1px solid #f1f5f9;">
                    <td>${u.email}</td>
                    <td>${new Date(u.lastActive).toLocaleString()}</td>
                    <td><button onclick="deleteUser('${u._id}')" style="color:red; background:none; border:none; cursor:pointer;"><i class="fas fa-trash"></i></button></td>
                </tr>
            `).join('');
        }

        function updateFeed(feed) {
            const div = document.getElementById('liveFeed');
            if (!div) return; // live feed not present on this page (Live Pulse is separated)
            div.innerHTML = feed.map(f => `
                <div class="feed-item">
                    <strong>${f.email.split('@')[0]}</strong> searched for:<br>
                    <span style="color: #f97316;">${f.ingredients}</span><br>
                    <small>${new Date(f.date).toLocaleTimeString()}</small>
                </div>
            `).join('');
        }

        function updateErrors(errors) {
            const tbody = document.getElementById('errorTable');
            tbody.innerHTML = errors.map(e => `
                <tr class="error-row">
                    <td>[${new Date(e.timestamp).toLocaleTimeString()}]</td>
                    <td>${e.message}</td>
                </tr>
            `).join('');
        }

        function updateCharts(users) {
            const allSearches = users.flatMap(u => u.searchHistory);
            const cuisineData = {};
            const dietaryData = {};

            allSearches.forEach(s => {
                cuisineData[s.cuisine] = (cuisineData[s.cuisine] || 0) + 1;
                dietaryData[s.dietary] = (dietaryData[s.dietary] || 0) + 1;
            });

            // Cuisine Chart (Bar)
            renderChart('cuisineChart', 'bar', cuisineData, '#f97316');
            // Dietary Chart (Pie)
            renderChart('dietaryChart', 'pie', dietaryData, ['#10b981', '#3b82f6', '#f59e0b', '#ef4444']);
        }

        function renderChart(id, type, data, color) {
            if(charts[id]) charts[id].destroy();
            charts[id] = new Chart(document.getElementById(id), {
                type: type,
                data: {
                    labels: Object.keys(data),
                    datasets: [{ data: Object.values(data), backgroundColor: color }]
                },
                options: { responsive: true, plugins: { legend: { display: type === 'pie' } } }
            });
        }

        async function deleteUser(id) {
            if(confirm("Delete user?")) {
                await fetch(`/api/admin/delete-user/${id}`, { method: 'DELETE' });
                fetchAllData();
            }
        }

        fetchAllData();
        setInterval(fetchAllData, 10000); // Auto-refresh every 10 seconds

        // sidebar toggle/responsive support
        function toggleSidebar() {
            document.querySelector('.sidebar').classList.toggle('collapsed');
        }
        function handleResize() {
            if (window.innerWidth < 768) {
                document.querySelector('.sidebar').classList.add('collapsed');
            } else {
                document.querySelector('.sidebar').classList.remove('collapsed');
            }
        }
        window.addEventListener('resize', handleResize);
        handleResize();
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/service-worker.js').catch(err => console.error('SW register failed', err));
        }

        // small nav menu toggle for admin pages
        function toggleNavMenu() {
            const menu = document.getElementById('nav-menu');
            if (!menu) return;
            const isHidden = menu.getAttribute('aria-hidden') === 'true';
            menu.setAttribute('aria-hidden', String(!isHidden));
            menu.style.display = isHidden ? 'block' : 'none';
        }

        // Close nav menu when clicking outside
        document.addEventListener('click', function(e) {
            const menu = document.getElementById('nav-menu');
            const btn = document.getElementById('nav-btn');
            if (!menu || !btn) return;
            const isVisible = menu.style.display === 'block';
            if (!isVisible) return;
            if (!menu.contains(e.target) && !btn.contains(e.target)) {
                menu.style.display = 'none';
                menu.setAttribute('aria-hidden', 'true');
            }
        });
    </script>
</body>
</html>
