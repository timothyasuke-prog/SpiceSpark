<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SpiceSpark | Live Pulse</title>
    <link rel="stylesheet" href="../user/style.css">
    <meta name="theme-color" content="#f97316">
    <link rel="manifest" href="../manifest.json">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Fluid layout for Live Pulse page */
        body { display: grid; grid-template-columns: minmax(80px, 280px) 1fr; background: #f1f5f9; min-height: 100vh; }
        .sidebar { background: #0f172a; color: white; padding: 20px; border-right: 1px solid #334155; height: 100vh; position: sticky; top: 0; overflow-y: auto; width: auto; }
        .nav-btn { display:block; padding:12px 10px; margin-bottom:8px; color:#94a3b8; cursor:pointer; border-radius:8px; font-weight:700; }
        .nav-btn:hover { background:#1e293b; color:#f97316; }
        .main-content { padding: 30px; width:100%; max-width:none; box-sizing: border-box; }
        .feed-item { background: #1e293b; padding: 12px; border-radius: 8px; margin-bottom: 10px; font-size: 0.95rem; border-left: 3px solid #f97316; word-break: break-word; white-space: normal; }

        @media (max-width: 1024px) {
            body { grid-template-columns: minmax(60px,220px) 1fr; }
        }
        @media (max-width:768px){
            body{display:block;} 
            .sidebar{position:fixed; left:-280px;} 
            .main-content{padding:20px}
        }
    </style>
</head>
<body>
    <!-- PWA install button (mobile) -->
    <button id="pwa-install-btn" class="pwa-install-btn" aria-hidden="true"><i class="fas fa-download"></i> Install</button>

    <!-- compact left nav button/menu (matches user panel style) -->
    <button id="nav-btn" class="left-nav-btn" aria-label="Open navigation" onclick="toggleNavMenu()"><i class="fas fa-bars"></i></button>
    <div id="nav-menu" class="left-nav-menu" aria-hidden="true" style="display:none;">
        <div style="margin-bottom:8px; font-weight:800; color: #f97316;">Admin</div>
        <div class="nav-item" onclick="location.href='/admin-dashboard'">Dashboard</div>
        <div class="nav-item" onclick="location.href='/admin-live-pulse'">Live Pulse</div>
    </div>

    <button class="sidebar-toggle-mobile" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>

    <aside class="sidebar">
        <button id="sidebar-toggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
        <h2 style="font-size: 1rem; color: #f97316;"><i class="fas fa-bolt"></i> NAV</h2>
        <div style="margin-top:12px;">
            <div class="nav-btn" onclick="location.href='/admin-dashboard'">Dashboard</div>
            <div class="nav-btn" onclick="location.href='/admin-live-pulse'" style="color:white; background:#0f172a;">Live Pulse</div>
        </div>
    </aside>

    <main class="main-content">
        <header style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h1>Live Pulse</h1>
            <div>
                <button onclick="fetchLiveFeed()" class="btn-primary" style="padding:8px 15px;"><i class="fas fa-sync"></i> Refresh</button>
            </div>
        </header>

        <div class="card">
            <h3 style="font-size:0.9rem; color:#64748b;">Recent Searches</h3>
            <div id="liveFeed" style="margin-top:12px; max-height:70vh; overflow-y:auto;"></div>
        </div>
    </main>

    <script>
        async function fetchLiveFeed() {
            try {
                const res = await fetch('/api/admin/live-feed');
                const feed = await res.json();
                const div = document.getElementById('liveFeed');
                if (!div) return;
                div.innerHTML = feed.map(f => `
                    <div class="feed-item">
                        <strong>${f.email}</strong> generated:<br>
                        <span style="color: #f97316;">${f.ingredients}</span><br>
                        <small>${new Date(f.date).toLocaleTimeString()}</small>
                    </div>
                `).join('');
            } catch (err) { console.error('Failed to load feed', err); }
        }

        fetchLiveFeed();
        setInterval(fetchLiveFeed, 10000);

        // sidebar helpers (same as original)
        function toggleSidebar() { document.querySelector('.sidebar').classList.toggle('collapsed'); }
        function handleResize() { if (window.innerWidth < 768) document.querySelector('.sidebar').classList.add('collapsed'); else document.querySelector('.sidebar').classList.remove('collapsed'); }
        window.addEventListener('resize', handleResize); handleResize();
        if ('serviceWorker' in navigator) navigator.serviceWorker.register('/service-worker.js').catch(console.error);

        // small nav menu toggle for admin pages
        function toggleNavMenu() {
            const menu = document.getElementById('nav-menu');
            if (!menu) return;
            const isHidden = menu.getAttribute('aria-hidden') === 'true';
            menu.setAttribute('aria-hidden', String(!isHidden));
            menu.style.display = isHidden ? 'block' : 'none';
        }

        // Close nav menu when clicking outside
        document.addEventListener('click', function(e) {
            const menu = document.getElementById('nav-menu');
            const btn = document.getElementById('nav-btn');
            if (!menu || !btn) return;
            const isVisible = menu.style.display === 'block';
            if (!isVisible) return;
            if (!menu.contains(e.target) && !btn.contains(e.target)) {
                menu.style.display = 'none';
                menu.setAttribute('aria-hidden', 'true');
            }
        });

        // PWA install prompt handling (mobile-friendly)
        let deferredInstallPrompt = null;
        const pwaBtn = document.getElementById('pwa-install-btn');

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredInstallPrompt = e;
            if (pwaBtn) {
                pwaBtn.style.display = 'block';
                pwaBtn.setAttribute('aria-hidden', 'false');
            }
        });

        if (pwaBtn) {
            pwaBtn.addEventListener('click', async () => {
                if (!deferredInstallPrompt) return;
                deferredInstallPrompt.prompt();
                const choice = await deferredInstallPrompt.userChoice;
                if (choice.outcome === 'accepted') console.log('PWA: user accepted install');
                else console.log('PWA: user dismissed install');
                deferredInstallPrompt = null;
                pwaBtn.style.display = 'none';
                pwaBtn.setAttribute('aria-hidden', 'true');
            });
        }

        window.addEventListener('appinstalled', () => {
            if (pwaBtn) {
                pwaBtn.style.display = 'none';
                pwaBtn.setAttribute('aria-hidden', 'true');
            }
            console.log('PWA installed');
        });
    </script>
</body>
</html>
