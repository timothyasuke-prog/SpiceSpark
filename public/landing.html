<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>

<title>SpiceSpark — Learn. Cook. Enjoy.</title>

<link rel="manifest" href="/manifest.json">

<style>

:root{
--accent:#f97316;
--white:#ffffff;
}

body{
margin:0;
font-family:Inter,system-ui;
background:linear-gradient(180deg,#e6eefc,#f1f5f9);
overflow-x:hidden;
animation:fadePage 1s ease;
}

@keyframes fadePage{
from{opacity:0}
to{opacity:1}
}

/* NAVBAR */

.top-nav{
position:absolute;
right:22px;
top:18px;
display:flex;
gap:18px;
align-items:center;
}

.top-nav a{
color:#fff;
text-decoration:none;
font-weight:700;
padding:8px 10px;
position:relative;
}

.top-nav a::after{
content:'';
position:absolute;
bottom:-4px;
left:0;
height:2px;
width:0;
background:#fff;
transition:.3s;
}

.top-nav a:hover::after{
width:100%;
}

.register{
background:var(--accent);
padding:10px 14px;
border-radius:8px;
}

.login{
background:rgba(255,255,255,0.15);
padding:10px 14px;
border-radius:8px;
}

/* HERO */

.hero{
max-width:1300px;
margin:40px auto;
padding:60px;
border-radius:16px;
display:flex;
gap:30px;
position:relative;
background:#08307a;
color:#fff;
overflow:hidden;
}

/* HERO TEXT ANIMATION */

.hero-card{
flex:1;
z-index:5;
animation:slideUp 1.2s ease;
}

@keyframes slideUp{
from{
opacity:0;
transform:translateY(50px)
}
to{
opacity:1;
transform:translateY(0)
}
}

.brand{
font-size:50px;
font-weight:900;
margin:20px 0;
}

.tag{
font-size:18px;
opacity:.9;
}

.feature-pills{
display:flex;
gap:12px;
margin-top:20px;
flex-wrap:wrap;
}

.pill{
background:rgba(255,255,255,0.1);
padding:8px 14px;
border-radius:999px;
}

/* FLOATING ICONS */

.floating-icon{
position:absolute;
border-radius:16px;
box-shadow:0 18px 40px rgba(0,0,0,0.3);
background-size:cover;
}

.fi-1{
right:10%;
top:8%;
width:110px;
height:110px;
background-image:url('/icons/icon-512.png');
animation:floaty 6s infinite ease-in-out;
}

.fi-2{
right:20%;
bottom:8%;
width:90px;
height:90px;
background-image:url('/icons/icon-192.png');
animation:floaty 7s infinite ease-in-out;
}

.fi-3{
left:6%;
top:20%;
width:120px;
height:120px;
background-image:url('/icons/icon-512.png');
animation:floaty 8s infinite ease-in-out;
}

.fi-4{
left:12%;
bottom:10%;
width:80px;
height:80px;
background-image:url('/icons/icon-192.png');
animation:floaty 5s infinite ease-in-out;
}

@keyframes floaty{
0%{transform:translateY(0)}
50%{transform:translateY(-20px)}
100%{transform:translateY(0)}
}

/* FOOTER */

footer{
position:fixed;
bottom:12px;
left:0;
right:0;
display:flex;
justify-content:center;
}

.footer-inner{
background:#fff;
padding:12px 18px;
border-radius:999px;
display:flex;
gap:16px;
align-items:center;
box-shadow:0 10px 30px rgba(0,0,0,0.15);
}

.whatsapp-btn{
background:#25D366;
color:#fff;
padding:10px 14px;
border-radius:999px;
text-decoration:none;
font-weight:800;
transition:.3s;
}

.whatsapp-btn:hover{
transform:scale(1.05);
}

.install-btn{
background:var(--accent);
border:none;
color:white;
padding:10px 14px;
border-radius:999px;
font-weight:800;
cursor:pointer;
transition:.3s;
}

.install-btn:hover{
transform:scale(1.05);
}

/* MOBILE */

@media(max-width:900px){

.hero{
flex-direction:column;
padding:40px;
text-align:center;
}

.top-nav{
position:static;
justify-content:center;
margin-bottom:20px;
}

.brand{
font-size:38px;
}

}

</style>

</head>

<body>

<main class="hero">

<nav class="top-nav">

<a href="/about.html">About</a>
<a href="/services.html">Services</a>
<a href="/info.html">Info</a>
<a href="/contact.html">Contact</a>

<a class="register" href="/register.html">Register</a>
<a class="login" href="/login.html">Login</a>

</nav>

<div class="hero-card">

<h1 class="brand">Cook anything with the ingredients you already have</h1>

<p class="tag">
Enter your ingredients and SpiceSpark instantly generates recipes for you.
Perfect for beginners and home chefs.
</p>

<div class="feature-pills">

<div class="pill">AI Recipe Generator</div>
<div class="pill">Cooking Guides</div>
<div class="pill">Save Recipes</div>

</div>

</div>

<div class="hero-visual">

<div class="floating-icon fi-1"></div>
<div class="floating-icon fi-2"></div>
<div class="floating-icon fi-3"></div>
<div class="floating-icon fi-4"></div>

</div>

</main>

<footer>

<div class="footer-inner">

<strong>SpiceSpark</strong>

<a class="whatsapp-btn" href="https://wa.me/254759834876">WhatsApp</a>

<button id="installBtn" class="install-btn">Install</button>

</div>

</footer>

<script>

/* redirect if logged in */

(function(){
const m=document.cookie.match('(^|;)\\s*spice_user\\s*=\\s*([^;]+)');
if(m&&m[2]){
window.location.href='/user/index.html';
}
})();

/* PWA install */

let deferredPrompt;

const installBtn=document.getElementById('installBtn');
installBtn.style.display='none';

window.addEventListener('beforeinstallprompt',(e)=>{
e.preventDefault();
deferredPrompt=e;
installBtn.style.display='inline-block';

installBtn.addEventListener('click',async()=>{
deferredPrompt.prompt();
await deferredPrompt.userChoice;
installBtn.style.display='none';
});
});

</script>

</body>
</html>
