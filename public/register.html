<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register - SpiceSpark</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(135deg,#020617,#0f172a);
overflow:hidden;
}

/* glowing background */

body::before{
content:"";
position:absolute;
width:600px;
height:600px;
background:#f97316;
filter:blur(200px);
opacity:0.25;
top:-100px;
left:-100px;
}

body::after{
content:"";
position:absolute;
width:600px;
height:600px;
background:#22c55e;
filter:blur(200px);
opacity:0.25;
bottom:-100px;
right:-100px;
}

/* card */

.register-card{
position:relative;
background:#020617;
padding:40px;
width:380px;
border-radius:14px;
box-shadow:0 20px 60px rgba(0,0,0,0.6);
text-align:center;
color:white;
}

.register-card h2{
color:#f97316;
margin-bottom:20px;
}

/* inputs */

.input-group{
position:relative;
margin-bottom:20px;
}

.input-group input{
width:100%;
padding:12px 40px;
border:none;
border-radius:8px;
background:#1e293b;
color:white;
}

.input-group i{
position:absolute;
top:12px;
left:12px;
color:#94a3b8;
}

/* button */

button{
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:#f97316;
color:white;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#fb923c;
transform:scale(1.05);
}

/* links */

.links{
margin-top:15px;
font-size:14px;
}

.links a{
color:#38bdf8;
text-decoration:none;
}

.links a:hover{
text-decoration:underline;
}

@media(max-width:450px){

.register-card{
width:90%;
}

}

</style>
</head>

<body>

<div class="register-card">

<h2>Create Account</h2>

<form method="POST" action="/register">

<div class="input-group">
<i class="fa fa-user"></i>
<input type="text" name="name" placeholder="Full Name" required>
</div>

<div class="input-group">
<i class="fa fa-envelope"></i>
<input type="email" name="email" placeholder="Email" required>
</div>

<div class="input-group">
<i class="fa fa-lock"></i>
<input type="password" name="password" placeholder="Password" required>
</div>

<button type="submit">Register</button>

</form>

<div class="links">

<p>Already have an account?  
<a href="login.html">Login</a></p>

</div>

</div>

</body>
</html>
