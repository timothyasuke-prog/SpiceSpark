<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register - SpiceSpark</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(135deg,#0f172a,#020617);
overflow:hidden;
}

/* glowing background */

body::before{
content:"";
position:absolute;
width:500px;
height:500px;
background:#22c55e;
filter:blur(200px);
opacity:0.25;
top:-100px;
left:-100px;
}

body::after{
content:"";
position:absolute;
width:500px;
height:500px;
background:#f97316;
filter:blur(200px);
opacity:0.25;
bottom:-100px;
right:-100px;
}

/* card */

.container{
position:relative;
background:#020617;
padding:40px;
border-radius:14px;
width:380px;
box-shadow:0 25px 70px rgba(0,0,0,0.6);
color:white;
animation:fadeIn 0.8s ease;
}

h2{
text-align:center;
margin-bottom:25px;
color:#f97316;
}

/* inputs */

input{
width:100%;
padding:12px;
margin-bottom:18px;
border:none;
border-radius:8px;
background:#1e293b;
color:white;
font-size:15px;
transition:0.3s;
}

input:focus{
outline:none;
background:#334155;
}

/* button */

button{
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:#f97316;
color:white;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#fb923c;
transform:scale(1.05);
}

/* links */

.links{
text-align:center;
margin-top:15px;
font-size:14px;
}

.links a{
color:#38bdf8;
text-decoration:none;
}

.links a:hover{
text-decoration:underline;
}

/* animation */

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

/* mobile */

@media(max-width:450px){

.container{
width:90%;
padding:30px;
}

}

</style>
</head>

<body>

<div class="container">

<h2>Create Your SpiceSpark Account</h2>

<form id="registerForm">

<input type="text" id="name" placeholder="Full Name" required>

<input type="email" id="email" placeholder="Email" required>

<input type="password" id="password" placeholder="Password" required>

<button type="submit">Register</button>

</form>

<div class="links">

<p>Already have an account? <a href="login.html">Login</a></p>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
